name: Deploy Firebase rules
on:
  push:
    branches: [main]
    paths:
      - 'app/firestore.rules'
      - 'app/firestore.indexes.json'
      - 'app/storage.rules'
      - 'app/firebase.json'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:

# The Next.js app is hosted on Vercel (see DEPLOY_VERCEL.md), which auto-deploys
# on every push. This workflow only syncs Firestore + Storage security rules
# and indexes to the campuxlegacy Firebase project (free Spark plan).
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write service account
        run: |
          echo "$SA_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"
        env:
          SA_JSON: ${{ secrets.FIREBASE_SA_PROD }}

      - name: Deploy rules + indexes
        run: |
          npx firebase-tools deploy \
            --only firestore:rules,firestore:indexes,storage \
            --project campuxlegacy \
            --non-interactive \
            --force
        working-directory: app
