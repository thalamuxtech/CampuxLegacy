runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyC1XM9xWbJRPhNKbEVZVaQFOWhEEjGiEzc
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: campuxlegacy.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: campuxlegacy
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: campuxlegacy.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "906416727110"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:906416727110:web:a578bf4657fe7b65ed5647
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-K27YGL8J1H
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_DEMO_MODE
    value: "false"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_USE_EMULATORS
    value: "false"
    availability: [BUILD, RUNTIME]

  # Server-only secrets — set these in the App Hosting backend settings
  # (Firebase Console → App Hosting → Settings → Secrets), NOT here.
  # They become available at runtime via process.env.
  - variable: FIREBASE_ADMIN_PROJECT_ID
    secret: firebase-admin-project-id
  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: firebase-admin-client-email
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: firebase-admin-private-key
